<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | AI Study Assistant</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="auth-page">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <h1 class="h3 fw-bold mb-3 text-center">Welcome back</h1>
              <p class="text-secondary text-center">Open your study space and continue from the topics you saved.</p>
              <div id="alertBox"></div>
              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label">College email or personal email</label>
                  <input type="email" class="form-control" id="email" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" required />
                </div>
                <button type="submit" class="btn btn-primary w-100">Enter Dashboard</button>
              </form>
              <p class="text-center mt-3 mb-0">
                First time here? <a href="signup.html">Create your study account</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
  </html>
